<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة الأنظمة الحديثة | م. أمير السيوفي</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        set,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDquJ7Juh5Gs6vyF20jwtnSWFdruPMxKak",
        authDomain: "smart-4108d.firebaseapp.com",
        databaseURL: "https://smart-4108d-default-rtdb.firebaseio.com",
        projectId: "smart-4108d",
        storageBucket: "smart-4108d.firebasestorage.app",
        messagingSenderId: "209084102507",
        appId: "1:209084102507:web:2e6c529a096764da99fe2e",
        measurementId: "G-STF1Q0LHML",
      };

      const app = initializeApp(firebaseConfig);
      const database = getDatabase(app);

      window.fbDB = database;
      window.fbRef = ref;
      window.fbPush = push;
      window.fbSet = set;
    </script>

    <style>
      :root {
        --primary-color: #2c3e50;
        --secondary-color: #3498db;
        --accent-color: #2ecc71;
        --light-color: #ecf0f1;
        --dark-color: #1a252f;
        --gold-color: #f1c40f;
        --shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        --gradient: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Cairo", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ed 100%);
        color: #333;
        height: 100vh;
        overflow: hidden; /* منع التمرير الطولي تماماً */
        line-height: 1.4;
      }

      .container {
        max-width: 1000px;
        height: 100%;
        margin: 0 auto;
        padding: 10px 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between; /* توزيع العناصر على طول الصفحة */
      }

      .header {
        text-align: center;
        padding: 15px; /* تقليل الحجم */
        background: var(--gradient);
        color: white;
        border-radius: 15px;
        box-shadow: var(--shadow);
        opacity: 0;
      }

      .profile-image {
        width: 70px; /* تصغير الصورة */
        height: 70px;
        border-radius: 50%;
        border: 3px solid white;
        margin: 0 auto 10px;
        background: linear-gradient(
          135deg,
          var(--secondary-color),
          var(--accent-color)
        );
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .profile-image i {
        font-size: 30px;
      }
      .header h1 {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 2px;
      }
      .header .title {
        font-size: 14px;
        color: var(--gold-color);
      }

      .contact-section {
        background: white;
        border-radius: 15px;
        padding: 15px 25px;
        box-shadow: var(--shadow);
        opacity: 0;
      }
      .contact-section h2 {
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 12px;
        font-size: 18px;
      }

      .contact-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .contact-item {
        padding: 10px;
        border-radius: 10px;
        background: var(--light-color);
        text-align: center;
      }
      .contact-icon {
        font-size: 20px;
        color: var(--secondary-color);
        margin-bottom: 5px;
      }
      .contact-item h3 {
        font-size: 13px;
      }
      .contact-item p {
        font-size: 12px;
      }

      /* Ticket Form Styling - Compact */
      .ticket-form {
        max-width: 100%;
        text-align: right;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
      }
      .form-group label {
        margin-bottom: 4px;
        font-weight: 700;
        color: var(--primary-color);
        font-size: 13px;
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 13px;
      }

      .submit-btn {
        width: 100%;
        margin-top: 12px;
        padding: 10px;
        background: var(--gradient);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .footer {
        background: var(--dark-color);
        color: white;
        padding: 10px;
        text-align: center;
        border-radius: 10px 10px 0 0;
        font-size: 12px;
      }

      .back-button {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 40px;
        height: 40px;
        background: var(--secondary-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-decoration: none;
        z-index: 1000;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate {
        animation: fadeInUp 0.5s ease-out forwards;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header class="header animate">
        <div class="profile-image"><i class="fas fa-user-tie"></i></div>
        <h1>المهندس / أمير السيوفي</h1>
        <div class="title">الإدارة العامة للأنظمة العدادات الحديثة</div>
      </header>

      <section class="contact-section animate" style="animation-delay: 0.2s">
        <h2>معلومات التواصل</h2>
        <div class="contact-grid">
          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
            <h3>البريد</h3>
            <p>amirmerrooo@gmail.com</p>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-phone"></i></div>
            <h3>موبايل</h3>
            <p dir="ltr">+20 101 756 4638</p>
          </div>
          <div class="contact-item">
            <div class="contact-icon">
              <i class="fas fa-map-marker-alt"></i>
            </div>
            <h3>الموقع</h3>
            <p>شمال الدلتا للكهرباء</p>
          </div>
        </div>
      </section>

      <section class="contact-section animate" style="animation-delay: 0.4s">
        <h2>إنشاء تذكرة دعم</h2>
        <form id="ticketForm" class="ticket-form">
          <div class="form-grid">
            <div class="form-group">
              <label>الاسم الكامل</label>
              <input type="text" name="name" placeholder="الاسم" required />
            </div>
            <div class="form-group">
              <label>رقم العداد</label>
              <input
                type="text"
                name="meter_id"
                placeholder="رقم العداد"
                required
              />
            </div>
            <div class="form-group">
              <label>نوع الطلب</label>
              <select name="request_type" required>
                <option value="">اختر النوع</option>
                <option value="عطل تقني">عطل تقني</option>
                <option value="اضافة بيانات">اضافة بيانات</option>
                <option value="تعديل بيانات">تعديل بيانات</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>البريد الألكتروني</label>
            <input
              type="email"
              name="email"
              placeholder="example@yahoo.com"
              required
            />
          </div>

          <div class="form-group" style="margin-top: 10px">
            <label>التفاصيل</label>
            <textarea
              name="message"
              rows="2"
              placeholder="اشرح طلبك..."
              required
            ></textarea>
          </div>

          <button type="submit" id="submitBtn" class="submit-btn">
            إرسال الطلب
          </button>
          <div
            id="statusMessage"
            style="
              display: none;
              margin-top: 10px;
              padding: 8px;
              border-radius: 5px;
              text-align: center;
              font-size: 13px;
            "
          ></div>
        </form>
      </section>

      <footer class="footer animate" style="animation-delay: 0.6s">
        &copy; <span id="year"></span> م. أمير السيوفي
      </footer>
    </div>

    <a href="index.html" class="back-button"
      ><i class="fas fa-arrow-left"></i
    ></a>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("year").textContent = new Date().getFullYear();

        const form = document.getElementById("ticketForm");
        const statusMessage = document.getElementById("statusMessage");
        const submitBtn = document.getElementById("submitBtn");

        // This maps the Arabic Option to the Database Folder Name
        const typeMapping = {
          "عطل تقني": "عطل تقني",
          "اضافة بيانات": "اضافة بيانات",
          "تعديل بيانات": "تعديل بيانات",
        };

        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          const formData = new FormData(form);
          const selectedArabicType = formData.get("request_type"); // The Arabic value
          const dbFolder = typeMapping[selectedArabicType] || "General"; // The English folder name

          const ticketData = {
            name: formData.get("name"),
            meter_id: formData.get("meter_id"),
            message: formData.get("message"),
            email: formData.get("email"),
            timestamp: new Date().toLocaleString("ar-EG"),
            type: selectedArabicType, // Storing the Arabic label inside the data too
          };

          submitBtn.disabled = true;
          submitBtn.innerText = "جاري الحفظ...";

          try {
            // We use the dbFolder (Technical/New_Record/Modify) so the admin panel sees it
            const customRef = window.fbRef(window.fbDB, `tickets/${dbFolder}`);
            await window.fbSet(customRef, ticketData);

            statusMessage.style.display = "block";
            statusMessage.style.backgroundColor = "#d4edda";
            statusMessage.style.color = "#155724";
            statusMessage.innerText = "تم ارسال التذكرة بنجاح.";

            form.reset();

            // Hide success message after 5 seconds
            setTimeout(() => {
              statusMessage.style.display = "none";
            }, 5000);
          } catch (error) {
            console.error(error);
            statusMessage.style.display = "block";
            statusMessage.style.backgroundColor = "#f8d7da";
            statusMessage.style.color = "#721c24";
            statusMessage.innerText =
              "خطأ في الإرسال: تأكد من الاتصال بالإنترنت.";
          } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "إرسال الطلب";
          }
        });
      });
    </script>
  </body>
</html>
