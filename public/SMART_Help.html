<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة الأنظمة الحديثة | م. أمير السيوفي</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-color: #2c3e50;
        --secondary-color: #3498db;
        --accent-color: #2ecc71;
        --light-color: #ecf0f1;
        --dark-color: #1a252f;
        --gold-color: #f1c40f;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        --gradient: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Cairo", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ed 100%);
        color: #333;
        min-height: 100vh;
        line-height: 1.6;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      /* Header Section */
      .header {
        text-align: center;
        padding: 60px 20px;
        background: var(--gradient);
        color: white;
        border-radius: 20px;
        margin-bottom: 40px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
        opacity: 0; /* For animation */
      }

      .profile-image {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 5px solid white;
        margin: 0 auto 25px;
        background: linear-gradient(
          135deg,
          var(--secondary-color),
          var(--accent-color)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .profile-image i {
        font-size: 70px;
        color: white;
      }

      .header h1 {
        font-size: clamp(28px, 5vw, 42px);
        font-weight: 800;
        margin-bottom: 10px;
      }

      .header .title {
        font-size: clamp(18px, 3vw, 24px);
        color: var(--gold-color);
        font-weight: 600;
      }

      /* Contact Section */
      .contact-section {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: var(--shadow);
        margin-bottom: 40px;
        opacity: 0;
      }

      .contact-section h2 {
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 30px;
        font-size: 28px;
      }

      .contact-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .contact-item {
        text-align: center;
        padding: 30px;
        border-radius: 15px;
        background: var(--light-color);
        transition: all 0.3s ease;
      }

      .contact-item:hover {
        background: var(--secondary-color);
        color: white;
        transform: translateY(-5px);
      }

      .contact-icon {
        font-size: 35px;
        color: var(--secondary-color);
        margin-bottom: 15px;
      }

      .contact-item:hover .contact-icon,
      .contact-item:hover h3,
      .contact-item:hover p {
        color: white;
      }

      /* Footer */
      .footer {
        background: var(--dark-color);
        color: white;
        padding: 30px;
        text-align: center;
        border-radius: 20px 20px 0 0;
        margin-top: 40px;
      }

      /* Back Button */
      .back-button {
        position: fixed;
        bottom: 30px;
        left: 30px;
        width: 50px;
        height: 50px;
        background: var(--secondary-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        text-decoration: none;
        transition: 0.3s;
        z-index: 1000;
      }

      .back-button:hover {
        transform: scale(1.1);
        background: var(--primary-color);
      }

      /* Animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate {
        animation: fadeInUp 0.8s ease-out forwards;
      }

      .delay-08 {
        animation-delay: 0.4s;
      }
      .delay-12 {
        animation-delay: 0.8s;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header class="header animate">
        <div class="profile-image">
          <i class="fas fa-user-tie"></i>
        </div>
        <h1>المهندس / أمير السيوفي</h1>
        <div class="title">الإدارة العامة للأنظمة العدادات الحديثة</div>
      </header>

      <section class="contact-section animate delay-08">
        <h2>معلومات التواصل</h2>
        <div class="contact-grid">
          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
            <h3>البريد الإلكتروني</h3>
            <p>amirmerrooo@gmail.com</p>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-phone"></i></div>
            <h3>موبايل</h3>
            <p dir="ltr">+20 101 756 4638</p>
          </div>
          <div class="contact-item">
            <div class="contact-icon">
              <i class="fas fa-map-marker-alt"></i>
            </div>
            <h3>موقع العمل</h3>
            <p>شركة شمال الدلتا لتوزيع الكهرباء</p>
            <p>قطاع العدادات</p>
            <p>الأدارة العامة للأنظمة العدادات الحديثة</p>
          </div>
        </div>
      </section>

      <footer class="footer animate delay-12">
        <div class="footer-copyright">
          &copy; <span id="year"></span> جميع الحقوق محفوظة | المهندس أمير
          السيوفي
        </div>
      </footer>
    </div>

    <a href="index.html" class="back-button" title="الصفحة الرئيسية">
      <i class="fas fa-arrow-left"></i>
    </a>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Set current year
        document.getElementById("year").textContent = new Date().getFullYear();

        // Simple Intersection Observer for scroll animations
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("animate");
              }
            });
          },
          { threshold: 0.1 },
        );

        document
          .querySelectorAll(".contact-section, .header, .footer")
          .forEach((el) => {
            observer.observe(el);
          });
      });
    </script>
  </body>
</html>
