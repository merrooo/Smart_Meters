<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم - الحسابات الكهربية</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>

    <style>
      :root {
        --primary-green: #2ecc71;
        --light-bg: #f9fbf9;
        --border-color: #e0e6e0;
        --dark-green: #27ae60;
        --text-dark: #2c3e50;
        --text-light: #7f8c8d;
        --white: #ffffff;
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        --radius: 12px;
        --transition: all 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Cairo", sans-serif;
        background-color: var(--light-bg);
        color: var(--text-dark);
        min-height: 100vh;
        line-height: 1.6;
      }

      /* Navigation */
      .main-nav {
        background: var(--white);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: var(--shadow);
        border-bottom: 3px solid var(--primary-green);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .nav-brand {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .logo {
        background: linear-gradient(
          135deg,
          var(--primary-green),
          var(--dark-green)
        );
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: white;
      }

      .brand-text h2 {
        font-size: 1rem;
        line-height: 1.4;
        font-weight: 600;
      }

      .brand-text .subtitle {
        font-size: 0.85rem;
        color: var(--text-light);
        display: block;
      }

      .time-box {
        background: var(--light-bg);
        padding: 0.6rem 1.2rem;
        border-radius: var(--radius);
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--dark-green);
      }

      /* Layout */
      .main-container {
        padding: 2rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      .menu-card {
        background: var(--white);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        border: 1px solid var(--border-color);
        max-width: 500px;
        margin: 0 auto;
      }

      .card-header {
        background: linear-gradient(
          to left,
          var(--primary-green),
          var(--dark-green)
        );
        color: white;
        padding: 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .card-header h3 {
        margin: 0;
        font-size: 1.3rem;
      }

      .card-body {
        padding: 1rem;
      }

      /* Links */
      .menu-link {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.9rem 1.2rem;
        margin-bottom: 0.6rem;
        background: var(--light-bg);
        border-radius: 10px;
        text-decoration: none;
        color: var(--text-dark);
        transition: var(--transition);
        border: 1px solid transparent;
        font-weight: 500;
      }

      .menu-link:hover {
        background: white;
        color: var(--dark-green);
        border-color: var(--primary-green);
        transform: translateX(-5px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
      }

      .menu-link ion-icon {
        color: var(--primary-green);
        font-size: 1.3rem;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .main-nav {
          flex-direction: column;
          gap: 1rem;
          text-align: center;
        }
        .nav-brand {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <nav class="main-nav">
      <div class="nav-brand">
        <div class="logo">
          <ion-icon name="leaf-outline"></ion-icon>
        </div>
        <div class="brand-text">
          <h2>
            وزارة الكهرباء والطاقة المتجددة
            <span class="subtitle">شركة شمال الدلتا لتوزيع الكهرباء</span>
          </h2>
        </div>
      </div>
      <div class="time-box">
        <ion-icon name="time-outline"></ion-icon>
        <span id="currentTime"></span>
      </div>
    </nav>

    <main class="main-container">
      <div class="menu-card">
        <div class="card-header">
          <ion-icon name="calculator-outline"></ion-icon>
          <h3>تركيب العدادات الذكية</h3>
        </div>
        <div class="card-body">
          <a href="SMART_Dashboard.html" class="menu-link">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span>لوحة التحكم</span>
          </a>
          <a href="SMART_Added_Mod.html" class="menu-link">
            <ion-icon name="alert-circle-outline"></ion-icon>
            <span>إضافة / تعديل عداد</span>
          </a>
          <a href="SMART_Admin.html" class="menu-link">
            <ion-icon name="construct-outline"></ion-icon>
            <span>رفع البيانات</span>
          </a>
          <a href="SMART_Excel.html" class="menu-link">
            <ion-icon name="document-text-outline"></ion-icon>
            <span>تنزيل البيانات</span>
          </a>
          <a href="SMART_R.html" class="menu-link">
            <ion-icon name="add-circle-outline"></ion-icon>
            <span>التقارير</span>
          </a>
          <a href="SMART_Map.html" class="menu-link">
            <ion-icon name="add-circle-outline"></ion-icon>
            <span>البحث عن عداد</span>
          </a>
          <a href="SMART_Conv_Cord.html" class="menu-link">
            <ion-icon name="add-circle-outline"></ion-icon>
            <span>تحويل الإحداثيات</span>
          </a>
          <a href="SMART_Help.html" class="menu-link">
            <ion-icon name="add-circle-outline"></ion-icon>
            <span>المساعدة</span>
          </a>
        </div>
      </div>
    </main>

    <script>
      function updateTime() {
        const now = new Date();
        const options = {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        };
        document.getElementById("currentTime").textContent =
          now.toLocaleDateString("ar-EG", options);
      }

      document.addEventListener("DOMContentLoaded", () => {
        updateTime();
        setInterval(updateTime, 1000);
      });
    </script>
  </body>
</html>
